<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0500;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a0a00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050200;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orangeglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Neon streaks -->
  <g opacity="0.3" stroke-width="1.5">
    <line x1="800" y1="0" x2="950" y2="630" stroke="#f97316"/>
    <line x1="850" y1="0" x2="1000" y2="630" stroke="#ea580c" opacity="0.5"/>
    <line x1="900" y1="0" x2="1050" y2="630" stroke="#f97316" opacity="0.3"/>
    <line x1="750" y1="0" x2="900" y2="630" stroke="#fb923c" opacity="0.4"/>
    <line x1="700" y1="0" x2="840" y2="630" stroke="#ea580c" opacity="0.2"/>
  </g>

  <!-- Story bubbles (background) -->
  <g opacity="0.1" fill="none" stroke="#f97316" stroke-width="1">
    <circle cx="960" cy="200" r="140"/>
    <circle cx="960" cy="200" r="110"/>
    <circle cx="960" cy="200" r="80"/>
  </g>

  <!-- Character silhouettes (abstract) -->
  <g opacity="0.15" fill="#f97316">
    <circle cx="1020" cy="170" r="25"/>
    <ellipse cx="1020" cy="220" rx="20" ry="35"/>
    <circle cx="900" cy="200" r="22"/>
    <ellipse cx="900" cy="248" rx="18" ry="32"/>
    <circle cx="1080" cy="240" r="18"/>
    <ellipse cx="1080" cy="282" rx="15" ry="28"/>
  </g>

  <!-- Corner brackets (orange) -->
  <g stroke="#f97316" stroke-width="2.5" fill="none" opacity="0.7">
    <polyline points="20,20 20,70 70,70"/>
    <polyline points="1180,20 1180,70 1130,70"/>
    <polyline points="20,610 20,560 70,560"/>
    <polyline points="1180,610 1180,560 1130,560"/>
  </g>

  <!-- "LIVE" badge -->
  <rect x="100" y="30" width="70" height="28" rx="4" fill="#ea580c" opacity="0.9"/>
  <circle cx="116" cy="44" r="5" fill="#fbbf24"/>
  <text x="130" y="50" font-family="monospace" font-size="13" font-weight="bold" fill="white">LIVE</text>

  <!-- Main title -->
  <text x="100" y="160" font-family="monospace" font-size="72" font-weight="bold" fill="#f97316" filter="url(#orangeglow)">MEGA CREW</text>
  <text x="100" y="240" font-family="monospace" font-size="52" font-weight="bold" fill="#fb923c" filter="url(#glow)">STORIES</text>

  <!-- Subtitle line -->
  <line x1="100" y1="265" x2="650" y2="265" stroke="#f97316" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="100" y="300" font-family="monospace" font-size="18" fill="#fed7aa">Self-evolving AI character universe · Live story generation</text>

  <!-- Feature bubbles -->
  <g font-family="monospace">
    <rect x="100" y="330" width="180" height="50" rx="8" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
    <text x="190" y="350" text-anchor="middle" fill="#f97316" font-size="22" font-weight="bold">AI</text>
    <text x="190" y="370" text-anchor="middle" fill="#9a3412" font-size="11">CHARACTERS</text>

    <rect x="295" y="330" width="180" height="50" rx="8" fill="#1a0a00" stroke="#ea580c" stroke-width="1.5"/>
    <text x="385" y="350" text-anchor="middle" fill="#fb923c" font-size="22" font-weight="bold">∞</text>
    <text x="385" y="370" text-anchor="middle" fill="#9a3412" font-size="11">NARRATIVES</text>

    <rect x="490" y="330" width="180" height="50" rx="8" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
    <text x="580" y="350" text-anchor="middle" fill="#fdba74" font-size="22" font-weight="bold">CREW</text>
    <text x="580" y="370" text-anchor="middle" fill="#9a3412" font-size="11">EPISODES</text>
  </g>

  <!-- Story teaser text -->
  <text x="100" y="420" font-family="monospace" font-size="14" fill="#6b3a1f" font-style="italic">"Every session spawns new stories. Every crew member evolves."</text>

  <!-- Bot name tags -->
  <g font-family="monospace" font-size="12">
    <rect x="100" y="445" width="90" height="22" rx="11" fill="#1a0a00" stroke="#f97316" stroke-width="1"/>
    <text x="145" y="460" text-anchor="middle" fill="#fb923c">Arcade</text>
    <rect x="202" y="445" width="90" height="22" rx="11" fill="#1a0a00" stroke="#ea580c" stroke-width="1"/>
    <text x="247" y="460" text-anchor="middle" fill="#fdba74">Discord</text>
    <rect x="304" y="445" width="90" height="22" rx="11" fill="#1a0a00" stroke="#f97316" stroke-width="1"/>
    <text x="349" y="460" text-anchor="middle" fill="#fb923c">Social</text>
    <rect x="406" y="445" width="90" height="22" rx="11" fill="#1a0a00" stroke="#ea580c" stroke-width="1"/>
    <text x="451" y="460" text-anchor="middle" fill="#fdba74">Buddy</text>
  </g>

  <!-- Divider -->
  <line x1="100" y1="490" x2="730" y2="490" stroke="#f97316" stroke-width="1" opacity="0.3"/>

  <!-- Status text -->
  <text x="100" y="520" font-family="monospace" font-size="13" fill="#7c2d12">Powered by Claude · Gemini · Llama · Weaviate RAG</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0a0500" opacity="0.95"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#f97316" stroke-width="1" opacity="0.5"/>
  <text x="30" y="611" font-family="monospace" font-size="13" fill="#9a3412">github.com/thebardchat/mega-crew-stories</text>
  <text x="1170" y="611" text-anchor="end" font-family="monospace" font-size="13" fill="#6b3a1f">Built by Shane + Claude Anthropic</text>
</svg>
